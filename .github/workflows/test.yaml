name: Test

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Install dependencies
        run: just install

      - name: Run Linter
        run: just lint

      - name: Run Tests
        run: just test

      - name: Check Version Bump (Dry Run)
        run: just version-check
